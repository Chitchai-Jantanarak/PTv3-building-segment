name: mae
stage: 0
model: mae
freeze_encoder: false

masking:
  type: block
  ratio: 0.75
  block_size: 64

loss:
  type: mse
  target: all

features:
  xyz: true
  relz: true
  rgb: true
  intensity: auto

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 0.05

scheduler:
  type: cosine
  warmup_epochs: 10

precision: bf16
epochs: 300
batch_size: 6
num_workers: 8
max_batch_points: 480000
