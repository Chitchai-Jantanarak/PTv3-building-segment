name: mae
stage: 0
model: mae
freeze_encoder: false

masking:
  type: block
  ratio: 0.65
  block_size: 16

loss:
  type: mse
  target: all

features:
  xyz: true
  relz: true
  rgb: true
  intensity: auto

optimizer:
  type: adamw
  lr: 3e-4
  weight_decay: 0.05

scheduler:
  type: cosine
  warmup_epochs: 20

precision: bf16
epochs: 300
batch_size: 18
num_workers: 6
max_batch_points: 400000
